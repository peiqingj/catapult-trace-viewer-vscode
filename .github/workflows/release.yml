name: Release VSIX

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.0.1"
        required: true
        default: "v0.0.1"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run package
      - name: Resolve package metadata
        id: package
        run: |
          node -e "const p = require('./package.json'); console.log('name=' + p.name); console.log('version=' + p.version);" >> "$GITHUB_OUTPUT"
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          tag="${INPUT_TAG:-${GITHUB_REF_NAME}}"
          vsix="${{ steps.package.outputs.name }}-${{ steps.package.outputs.version }}.vsix"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "$vsix" --clobber
          else
            gh release create "$tag" "$vsix" --target "$GITHUB_SHA" --title "$tag" --generate-notes
          fi